# Pull Request の検証。型チェック・テスト・ビルドを実行する。
# デプロイは行わない（GitHub Pages へのデプロイは deploy-pages.yml が main で実行）。
name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
